<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Mapa de Empresas CORE</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;width:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#2c3e50;background:#1a2740;}
header{position:fixed;top:0;left:0;right:0;z-index:1000;background:#1a2740;color:#fff;padding:0 14px;height:48px;display:flex;align-items:center;gap:8px;}
header h1{font-size:13px;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
header span{font-size:11px;color:#8a99b0;white-space:nowrap;}
.header-btns-desktop{display:flex;gap:4px;flex-shrink:0;}
.hbtn-icon{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.18);color:#fff;border-radius:7px;padding:5px 10px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:4px;white-space:nowrap;}
.hbtn-icon:hover{background:rgba(255,255,255,0.22);}
/* Menú móvil */
.mob-menu-btn{display:none;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.18);color:#fff;border-radius:7px;width:34px;height:34px;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0;}
.mob-menu-btn:active{background:rgba(255,255,255,0.25);}
.mob-menu-dropdown{display:none;position:fixed;top:52px;right:10px;background:#1a2740;border:1px solid rgba(255,255,255,0.15);border-radius:12px;z-index:1500;overflow:hidden;box-shadow:0 6px 24px rgba(0,0,0,0.4);min-width:200px;}
.mob-menu-dropdown.open{display:block;}
.mob-menu-item{display:flex;align-items:center;gap:10px;padding:13px 16px;color:#fff;font-size:13px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.08);}
.mob-menu-item:last-child{border-bottom:none;}
.mob-menu-item:active{background:rgba(255,255,255,0.12);}
.mob-menu-item i{font-size:16px;opacity:0.8;}
@media(max-width:699px){
  .header-btns-desktop{display:none;}
  .mob-menu-btn{display:flex;}
}
#map{position:fixed;top:48px;left:0;right:0;bottom:0;z-index:0;}
.fab-group{position:fixed;right:12px;top:60px;z-index:900;display:flex;flex-direction:column;gap:8px;}
.fab{width:42px;height:42px;border-radius:50%;border:none;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,0.25);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:#1a2740;}
.fab:active{transform:scale(0.93);}
.fab.primary{background:#1a2740;color:#fff;}
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:1100;pointer-events:none;transition:background 0.25s;}
.sheet-overlay.open{background:rgba(0,0,0,0.35);pointer-events:all;}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:1200;background:#fff;border-radius:18px 18px 0 0;box-shadow:0 -4px 24px rgba(0,0,0,0.18);transform:translateY(100%);transition:transform 0.32s cubic-bezier(.4,0,.2,1);max-height:90vh;display:flex;flex-direction:column;}
.sheet.open{transform:translateY(0);}
.sheet-handle{width:38px;height:4px;background:#dce3ed;border-radius:4px;margin:10px auto 4px;flex-shrink:0;cursor:pointer;}
.sheet-header{padding:0 16px 10px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.sheet-header h2{font-size:15px;font-weight:500;color:#1a2740;flex:1;}
.sheet-header button{padding:5px 10px;border:1px solid #dce3ed;border-radius:8px;background:#fff;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:4px;}
.sheet-body{overflow-y:auto;padding:0 16px 24px;flex:1;}
@media(min-width:700px){
  .sheet-overlay,.sheet,.fab-group{display:none!important;}
  .desktop-panel{display:flex!important;}
  #map{right:300px;}
}
.desktop-panel{display:none;position:fixed;top:48px;right:0;bottom:0;width:300px;z-index:500;background:#f4f6f9;border-left:1px solid #dce3ed;flex-direction:column;overflow:hidden;}
.desktop-panel .tabs{display:flex;border-bottom:1px solid #dce3ed;flex-shrink:0;}
.desktop-panel .tabs button{flex:1;padding:10px;border:none;border-bottom:2px solid transparent;background:transparent;font-size:12px;cursor:pointer;color:#5a6a85;}
.desktop-panel .tabs button.active{color:#1a2740;border-bottom-color:#1a2740;font-weight:500;}
.desktop-panel .tab-content{display:none;flex:1;overflow-y:auto;padding:12px;flex-direction:column;}
.desktop-panel .tab-content.active{display:flex;}
label{font-size:11px;color:#8a99b0;display:block;margin-bottom:3px;margin-top:10px;}
label:first-child{margin-top:0;}
input[type=text],input[type=tel],input[type=email],select{width:100%;padding:9px 11px;border:1px solid #dce3ed;border-radius:8px;font-size:13px;color:#2c3e50;background:#f9fafc;outline:none;}
input:focus,select:focus{border-color:#378ADD;background:#fff;}
.autocomplete-wrap{position:relative;}
.autocomplete-list{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1px solid #dce3ed;border-radius:9px;box-shadow:0 4px 16px rgba(0,0,0,0.12);z-index:9999;max-height:200px;overflow-y:auto;display:none;}
.autocomplete-list.open{display:block;}
.autocomplete-item{padding:9px 12px;font-size:13px;cursor:pointer;border-bottom:1px solid #f0f4f8;color:#2c3e50;}
.autocomplete-item:last-child{border-bottom:none;}
.autocomplete-item:hover{background:#f0f4f8;}
.autocomplete-item small{color:#8a99b0;font-size:11px;display:block;}
.location-selected{background:#eaf7f0;border:1px solid #a8dfc5;border-radius:8px;padding:8px 11px;font-size:12px;color:#1a6b45;margin-top:6px;display:none;align-items:center;gap:8px;}
.location-selected.show{display:flex;}
.location-selected i{font-size:15px;flex-shrink:0;}
.loc-change{margin-left:auto;font-size:11px;color:#378ADD;cursor:pointer;text-decoration:underline;white-space:nowrap;}
.btn-row{display:flex;gap:8px;margin-top:12px;}
button.btn-primary{flex:1;padding:10px;border:none;border-radius:9px;background:#1a2740;color:#fff;font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;}
button.btn-primary:active{background:#243655;}
button.btn-sec{flex:1;padding:10px;border:1px solid #dce3ed;border-radius:9px;background:#fff;color:#2c3e50;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;}
button.btn-sec:active{background:#f0f4f8;}
/* Bloque contacto */
.contacto-block{background:#f4f6f9;border-radius:9px;padding:10px;margin-top:6px;position:relative;}
.contacto-block .c-row{display:flex;gap:6px;margin-bottom:6px;}
.contacto-block .c-row:last-child{margin-bottom:0;}
.contacto-block .c-row input{flex:1;margin:0;}
.contacto-block .c-label{font-size:10px;color:#8a99b0;margin-bottom:2px;margin-top:0;}
.contacto-block .c-field{display:flex;flex-direction:column;flex:1;}
.btn-rem-c{position:absolute;top:8px;right:8px;padding:4px 7px;border:1px solid #f5c6c6;border-radius:7px;background:#fff;color:#c0392b;cursor:pointer;font-size:12px;}
.btn-add-c{width:100%;margin-top:8px;padding:8px;border:1px dashed #b5d4f4;border-radius:8px;background:transparent;color:#378ADD;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;}
.btn-add-c:active{background:#eaf3fb;}
.filter-wrap{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;}
.empresa-card{background:#fff;border:1px solid #dce3ed;border-radius:10px;padding:10px 12px;border-left:4px solid #ccc;margin-bottom:6px;}
.empresa-card .ec-nombre{font-weight:500;font-size:13px;color:#1a2740;}
.empresa-card .ec-badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;margin-top:3px;font-weight:500;}
.empresa-card .ec-ciudad{font-size:11px;color:#8a99b0;margin-top:2px;}
.empresa-card .ec-contactos{font-size:11px;color:#5a6a85;margin-top:4px;}
.empresa-card .ec-actions{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap;}
.empresa-card .ec-actions button{padding:5px 10px;border:1px solid #dce3ed;border-radius:7px;background:#fff;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:4px;color:#2c3e50;}
.empresa-card .ec-actions button:active{background:#f0f4f8;}
.empresa-card .ec-actions .btn-del{color:#c0392b;border-color:#f5c6c6;}
.empty-msg{text-align:center;color:#8a99b0;font-size:13px;padding:24px 0;}
/* Grupos casa central / sucursales */
.grupo-empresa{margin-bottom:10px;}
.grupo-header{background:#fff;border:1px solid #dce3ed;border-radius:10px;padding:10px 12px;border-left:4px solid #ccc;cursor:pointer;}
.grupo-header .gh-top{display:flex;align-items:center;gap:8px;}
.grupo-header .gh-nombre{font-weight:600;font-size:13px;color:#1a2740;flex:1;}
.grupo-header .gh-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:500;}
.grupo-header .gh-ciudad{font-size:11px;color:#8a99b0;margin-top:2px;}
.grupo-header .gh-actions{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap;}
.grupo-header .gh-actions button{padding:5px 10px;border:1px solid #dce3ed;border-radius:7px;background:#fff;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:4px;color:#2c3e50;}
.grupo-header .gh-actions button:active{background:#f0f4f8;}
.grupo-header .gh-actions .btn-del{color:#c0392b;border-color:#f5c6c6;}
.grupo-header .gh-toggle{font-size:13px;color:#8a99b0;transition:transform 0.2s;}
.grupo-header .gh-toggle.open{transform:rotate(180deg);}
.sucursales-wrap{display:none;padding-left:14px;margin-top:4px;}
.sucursales-wrap.open{display:block;}
.sucursal-card{background:#f9fafc;border:1px solid #dce3ed;border-radius:9px;padding:9px 11px;border-left:3px solid #ccc;margin-bottom:5px;}
.sucursal-card .sc-nombre{font-size:12px;font-weight:500;color:#1a2740;}
.sucursal-card .sc-badge{font-size:10px;padding:1px 7px;border-radius:10px;font-weight:500;}
.sucursal-card .sc-ciudad{font-size:10px;color:#8a99b0;margin-top:2px;}
.sucursal-card .sc-contactos{font-size:10px;color:#5a6a85;margin-top:3px;}
.sucursal-card .sc-actions{display:flex;gap:4px;margin-top:6px;}
.sucursal-card .sc-actions button{padding:4px 8px;border:1px solid #dce3ed;border-radius:6px;background:#fff;font-size:10px;cursor:pointer;display:flex;align-items:center;gap:3px;color:#2c3e50;}
.sucursal-card .sc-actions .btn-del{color:#c0392b;border-color:#f5c6c6;}
.tipo-selector{display:flex;gap:6px;margin-bottom:0;}
.tipo-btn{flex:1;padding:8px;border:1px solid #dce3ed;border-radius:8px;background:#f9fafc;font-size:12px;cursor:pointer;text-align:center;color:#5a6a85;transition:all 0.15s;}
.tipo-btn.active{background:#1a2740;color:#fff;border-color:#1a2740;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:2000;display:none;align-items:center;justify-content:center;padding:16px;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:14px;padding:20px;width:100%;max-width:460px;max-height:88vh;overflow-y:auto;}
.modal h2{font-size:15px;font-weight:500;color:#1a2740;margin-bottom:12px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a2740;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;z-index:3000;opacity:0;transition:all 0.3s;pointer-events:none;text-align:center;max-width:90vw;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<header>
  <i class="ti ti-map-pin" style="font-size:18px;flex-shrink:0;"></i>
  <h1>Mapa de Empresas CORE</h1>
  <!-- Desktop: botones visibles -->
  <div class="header-btns-desktop">
    <button class="hbtn-icon" onclick="exportarExcel()" title="Bajar Excel"><i class="ti ti-table"></i> Excel</button>
    <button class="hbtn-icon" onclick="document.getElementById('imp-excel-file').click()" title="Importar Excel"><i class="ti ti-table-import"></i> Importar</button>
    <button class="hbtn-icon" onclick="exportarJSON()" title="Backup"><i class="ti ti-download"></i></button>
    <button class="hbtn-icon" onclick="document.getElementById('imp-json-file').click()" title="Restaurar"><i class="ti ti-upload"></i></button>
  </div>
  <!-- Móvil: un solo botón que abre menú -->
  <button class="mob-menu-btn" onclick="toggleMobMenu()" id="mob-menu-btn" title="Opciones"><i class="ti ti-dots-vertical"></i></button>
  <span id="header-count">0</span>
  <input type="file" id="imp-excel-file" accept=".csv,.xlsx,.xls" style="display:none" onchange="importarExcel(event)"/>
  <input type="file" id="imp-json-file" accept=".json" style="display:none" onchange="importarJSON(event)"/>
</header>

<!-- Menú desplegable móvil -->
<div class="mob-menu-dropdown" id="mob-menu">
  <div class="mob-menu-item" onclick="mobAccion('excel')"><i class="ti ti-table"></i> Bajar Excel</div>
  <div class="mob-menu-item" onclick="mobAccion('importar')"><i class="ti ti-table-import"></i> Importar Excel</div>
  <div class="mob-menu-item" onclick="mobAccion('backup')"><i class="ti ti-download"></i> Backup JSON</div>
  <div class="mob-menu-item" onclick="mobAccion('restaurar')"><i class="ti ti-upload"></i> Restaurar JSON</div>
</div>

<div id="map"></div>
<div class="toast" id="toast"></div>

<div class="fab-group">
  <button class="fab primary" onclick="abrirSheet('nueva')"><i class="ti ti-plus"></i></button>
  <button class="fab" onclick="abrirSheet('lista')"><i class="ti ti-list"></i></button>
  <button class="fab" onclick="cargarSheets()" title="Sincronizar"><i class="ti ti-refresh"></i></button>
</div>

<div class="sheet-overlay" id="sheet-overlay" onclick="cerrarSheet()"></div>

<!-- SHEET NUEVA -->
<div class="sheet" id="sheet-nueva">
  <div class="sheet-handle" onclick="cerrarSheet()"></div>
  <div class="sheet-header">
    <h2><i class="ti ti-building" style="font-size:15px;margin-right:6px;"></i>Nueva empresa</h2>
    <button onclick="cerrarSheet()"><i class="ti ti-x"></i></button>
  </div>
  <div class="sheet-body">
    <label>Tipo</label>
    <div class="tipo-selector">
      <div class="tipo-btn active" id="inp-tipo-cc" onclick="setTipo('inp','cc')">🏢 Casa Central</div>
      <div class="tipo-btn" id="inp-tipo-suc" onclick="setTipo('inp','suc')">🏪 Sucursal</div>
    </div>
    <div id="inp-madre-wrap" style="display:none;margin-top:6px;">
      <label style="margin-top:0;">Empresa madre</label>
      <select id="inp-madre"><option value="">— Seleccioná empresa —</option></select>
    </div>
    <label>Buscar ubicación</label>
    <div class="autocomplete-wrap">
      <input type="text" id="inp-buscar" placeholder="Ej: Córdoba, Mendoza..." autocomplete="off" oninput="onBuscarInput('inp-buscar','inp-ac','inp')"/>
      <div class="autocomplete-list" id="inp-ac"></div>
    </div>
    <div class="location-selected" id="inp-loc">
      <i class="ti ti-map-pin"></i><span id="inp-loc-texto"></span>
      <span class="loc-change" onclick="cambiarUbicacion('inp-buscar','inp-ac','inp-loc','inp')">Cambiar</span>
    </div>
    <label>Nombre de la empresa / sucursal</label>
    <input type="text" id="inp-nombre" placeholder="Ej: Telecom SA"/>
    <label>Estado</label>
    <select id="inp-estado">
      <option value="">— Seleccioná un estado —</option>
      <option value="facturacion">OP con facturación</option>
      <option value="migracion-final">OP con migración de base final</option>
      <option value="migracion-via">OP en vía de migración</option>
      <option value="pre-impl">OP confirmados en pre implementación</option>
      <option value="prospecto">Prospectos interesados, en seguimiento</option>
      <option value="no-interesado">OP no interesados</option>
      <option value="especial">OP especiales</option>
      <option value="reconectar">OP a reconectar</option>
    </select>
    <label>Contactos</label>
    <div id="inp-contactos"></div>
    <button class="btn-add-c" onclick="agregarContacto('inp-contactos')"><i class="ti ti-plus"></i> Agregar contacto</button>
    <div class="btn-row">
      <button class="btn-sec" onclick="cerrarSheet()"><i class="ti ti-x"></i> Cancelar</button>
      <button class="btn-primary" onclick="guardarNueva('inp','inp-contactos','inp-loc')"><i class="ti ti-check"></i> Guardar</button>
    </div>
  </div>
</div>

<!-- SHEET LISTA -->
<div class="sheet" id="sheet-lista">
  <div class="sheet-handle" onclick="cerrarSheet()"></div>
  <div class="sheet-header">
    <h2><i class="ti ti-list" style="font-size:15px;margin-right:6px;"></i>Empresas <span id="contador" style="font-size:12px;color:#8a99b0;font-weight:400;"></span></h2>
    <button onclick="cerrarSheet()"><i class="ti ti-x"></i></button>
  </div>
  <div class="sheet-body">
    <div class="filter-wrap">
      <input type="text" id="inp-filtro" placeholder="Buscar empresa, contacto..." oninput="renderLista()"/>
      <select id="filtro-estado" onchange="renderLista()">
        <option value="">Todos los estados</option>
        <option value="facturacion">OP con facturación</option>
        <option value="migracion-final">OP migración base final</option>
        <option value="migracion-via">OP en vía de migración</option>
        <option value="pre-impl">OP pre implementación</option>
        <option value="prospecto">Prospectos en seguimiento</option>
        <option value="no-interesado">OP no interesados</option>
        <option value="especial">OP especiales</option>
        <option value="reconectar">OP a reconectar</option>
      </select>
    </div>
    <div id="lista-empresas"><div class="empty-msg">Sin empresas aún</div></div>
  </div>
</div>

<!-- PANEL DESKTOP -->
<div class="desktop-panel">
  <div class="tabs">
    <button class="active" onclick="desktopTab('nueva',this)"><i class="ti ti-plus"></i> Nueva</button>
    <button onclick="desktopTab('lista',this)"><i class="ti ti-list"></i> Empresas</button>
  </div>
  <div class="tab-content active" id="dtab-nueva">
    <label>Tipo</label>
    <div class="tipo-selector">
      <div class="tipo-btn active" id="d-tipo-cc" onclick="setTipo('d','cc')">🏢 Casa Central</div>
      <div class="tipo-btn" id="d-tipo-suc" onclick="setTipo('d','suc')">🏪 Sucursal</div>
    </div>
    <div id="d-madre-wrap" style="display:none;margin-top:6px;">
      <label style="margin-top:0;">Empresa madre</label>
      <select id="d-madre"><option value="">— Seleccioná empresa —</option></select>
    </div>
    <label>Buscar ubicación</label>
    <div class="autocomplete-wrap">
      <input type="text" id="d-buscar" placeholder="Ej: Rosario, Salta..." autocomplete="off" oninput="onBuscarInput('d-buscar','d-ac','d')"/>
      <div class="autocomplete-list" id="d-ac"></div>
    </div>
    <div class="location-selected" id="d-loc">
      <i class="ti ti-map-pin"></i><span id="d-loc-texto"></span>
      <span class="loc-change" onclick="cambiarUbicacion('d-buscar','d-ac','d-loc','d')">Cambiar</span>
    </div>
    <label>Nombre de la empresa / sucursal</label>
    <input type="text" id="d-nombre" placeholder="Ej: Telecom SA"/>
    <label>Estado</label>
    <select id="d-estado">
      <option value="">— Seleccioná un estado —</option>
      <option value="facturacion">OP con facturación</option>
      <option value="migracion-final">OP con migración de base final</option>
      <option value="migracion-via">OP en vía de migración</option>
      <option value="pre-impl">OP confirmados en pre implementación</option>
      <option value="prospecto">Prospectos interesados, en seguimiento</option>
      <option value="no-interesado">OP no interesados</option>
      <option value="especial">OP especiales</option>
      <option value="reconectar">OP a reconectar</option>
    </select>
    <label>Contactos</label>
    <div id="d-contactos"></div>
    <button class="btn-add-c" onclick="agregarContacto('d-contactos')"><i class="ti ti-plus"></i> Agregar contacto</button>
    <div class="btn-row">
      <button class="btn-primary" onclick="guardarNueva('d','d-contactos','d-loc')"><i class="ti ti-check"></i> Guardar</button>
    </div>
  </div>
  <div class="tab-content" id="dtab-lista">
    <input type="text" id="d-filtro" placeholder="Buscar..." oninput="renderLista()" style="margin-bottom:6px;"/>
    <select id="d-filtro-estado" onchange="renderLista()" style="margin-bottom:10px;">
      <option value="">Todos los estados</option>
      <option value="facturacion">OP con facturación</option>
      <option value="migracion-final">OP migración base final</option>
      <option value="migracion-via">OP en vía de migración</option>
      <option value="pre-impl">OP pre implementación</option>
      <option value="prospecto">Prospectos en seguimiento</option>
      <option value="no-interesado">OP no interesados</option>
      <option value="especial">OP especiales</option>
      <option value="reconectar">OP a reconectar</option>
    </select>
    <div id="d-lista-empresas"><div class="empty-msg">Sin empresas aún</div></div>
  </div>
</div>

<!-- MODAL EDICIÓN -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2><i class="ti ti-edit" style="font-size:15px;margin-right:6px;"></i>Editar empresa</h2>
    <label>Ubicación</label>
    <div class="autocomplete-wrap">
      <input type="text" id="m-buscar" placeholder="Buscar nueva ubicación..." autocomplete="off" oninput="onBuscarInput('m-buscar','m-ac','m')"/>
      <div class="autocomplete-list" id="m-ac"></div>
    </div>
    <div class="location-selected" id="m-loc">
      <i class="ti ti-map-pin"></i><span id="m-loc-texto"></span>
      <span class="loc-change" onclick="cambiarUbicacion('m-buscar','m-ac','m-loc','m')">Cambiar</span>
    </div>
    <label>Tipo</label>
    <div class="tipo-selector">
      <div class="tipo-btn active" id="m-tipo-cc" onclick="setTipo('m','cc')">🏢 Casa Central</div>
      <div class="tipo-btn" id="m-tipo-suc" onclick="setTipo('m','suc')">🏪 Sucursal</div>
    </div>
    <div id="m-madre-wrap" style="display:none;margin-top:6px;">
      <label style="margin-top:0;">Empresa madre</label>
      <select id="m-madre"><option value="">— Seleccioná empresa —</option></select>
    </div>
    <label>Nombre</label>
    <input type="text" id="m-nombre"/>
    <label>Estado</label>
    <select id="m-estado">
      <option value="">— Seleccioná un estado —</option>
      <option value="facturacion">OP con facturación</option>
      <option value="migracion-final">OP con migración de base final</option>
      <option value="migracion-via">OP en vía de migración</option>
      <option value="pre-impl">OP confirmados en pre implementación</option>
      <option value="prospecto">Prospectos interesados, en seguimiento</option>
      <option value="no-interesado">OP no interesados</option>
      <option value="especial">OP especiales</option>
      <option value="reconectar">OP a reconectar</option>
    </select>
    <label>Contactos</label>
    <div id="m-contactos"></div>
    <button class="btn-add-c" onclick="agregarContacto('m-contactos')"><i class="ti ti-plus"></i> Agregar contacto</button>
    <div class="btn-row" style="margin-top:12px;">
      <button class="btn-sec" onclick="cerrarModal()"><i class="ti ti-x"></i> Cancelar</button>
      <button class="btn-primary" onclick="guardarModal()"><i class="ti ti-check"></i> Guardar</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── BASE DE DATOS GOOGLE SHEETS ──
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzgpRSh0jQ5er3nAD0h7-Dsn5FeWkQ6PnZc_aWjvTGZsulUhzipIiIxIRspxzDJEmVkPw/exec';
const STORAGE_KEY = 'mapa-empresas-argentina'; // cache local

const ESTADOS = {
  facturacion:       {label:'OP con facturación',              color:'#27ae60', text:'#fff'},
  'migracion-final': {label:'OP migración base final',         color:'#2980b9', text:'#fff'},
  'migracion-via':   {label:'OP en vía de migración',          color:'#e67e22', text:'#fff'},
  'pre-impl':        {label:'OP pre implementación',           color:'#f1c40f', text:'#7a6000'},
  prospecto:         {label:'Prospectos en seguimiento',       color:'#e74c3c', text:'#fff'},
  'no-interesado':   {label:'OP no interesados',               color:'#2c3e50', text:'#fff'},
  especial:          {label:'OP especiales',                   color:'#8e44ad', text:'#fff'},
  reconectar:        {label:'OP a reconectar',                 color:'#a29bfe', text:'#4a3d8f'},
};

const MAPA_ESTADOS = {
  'op con facturación':'facturacion','op con facturacion':'facturacion','facturación':'facturacion','facturacion':'facturacion',
  'op con migración de base final':'migracion-final','op migración base final':'migracion-final','migracion-final':'migracion-final',
  'op en vía de migración':'migracion-via','op en via de migracion':'migracion-via','migracion-via':'migracion-via',
  'op confirmados en pre implementación':'pre-impl','op pre implementación':'pre-impl','pre-impl':'pre-impl','pre implementacion':'pre-impl',
  'prospectos interesados, en seguimiento':'prospecto','prospectos en seguimiento':'prospecto','prospecto':'prospecto',
  'op no interesados':'no-interesado','no interesados':'no-interesado','no-interesado':'no-interesado',
  'op especiales':'especial','especial':'especial','especiales':'especial',
  'op a reconectar':'reconectar','reconectar':'reconectar',
};

let map, empresas = [], modalId = null;
const pending = {}, acTimers = {};

/* ── MAP ── */
function initMap() {
  map = L.map('map', {zoomControl: false}).setView([-38.5, -63.5], 4);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a>', maxZoom: 18
  }).addTo(map);
  L.control.zoom({position: 'bottomright'}).addTo(map);
}

function markerIcon(estado, tipo) {
  const c = (ESTADOS[estado] || {color: '#aaa'}).color;
  if (tipo === 'suc') {
    // Sucursal: circulo mas chico
    return L.divIcon({className: '', html: `<div style="width:16px;height:16px;border-radius:50%;background:${c};border:2px solid #fff;box-shadow:0 1px 5px rgba(0,0,0,0.4);cursor:pointer;"></div>`, iconAnchor: [8, 8]});
  }
  // Casa central: cuadrado con bordes redondeados
  return L.divIcon({className: '', html: `<div style="width:22px;height:22px;border-radius:5px;background:${c};border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.4);cursor:pointer;"></div>`, iconAnchor: [11, 11]});
}

/* ── AUTOCOMPLETE ── */
async function onBuscarInput(inputId, listId, prefix) {
  const q = document.getElementById(inputId).value.trim();
  const list = document.getElementById(listId);
  clearTimeout(acTimers[inputId]);
  if (q.length < 3) { list.classList.remove('open'); list.innerHTML = ''; return; }
  acTimers[inputId] = setTimeout(async () => {
    try {
      const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&countrycodes=ar&q=${encodeURIComponent(q)}&limit=6`);
      const data = await r.json();
      if (!data.length) { list.innerHTML = '<div class="autocomplete-item" style="color:#8a99b0;">Sin resultados</div>'; list.classList.add('open'); return; }
      list.innerHTML = data.map(d => {
        const partes = d.display_name.split(',');
        return `<div class="autocomplete-item" onclick="seleccionarLugar('${inputId}','${listId}','${prefix}',${d.lat},${d.lon},'${d.display_name.replace(/'/g,"\\'")}')">
          ${partes.slice(0,2).join(',')}<small>${partes.slice(2,4).join(',').trim()}</small></div>`;
      }).join('');
      list.classList.add('open');
    } catch(e) {}
  }, 350);
}

function seleccionarLugar(inputId, listId, prefix, lat, lon, nombre) {
  pending[prefix] = {lat: +lat, lng: +lon, nombre};
  document.getElementById(inputId).value = '';
  document.getElementById(listId).classList.remove('open');
  document.getElementById(listId).innerHTML = '';
  document.getElementById(prefix + '-loc-texto').textContent = nombre.split(',').slice(0,2).join(',');
  document.getElementById(prefix + '-loc').classList.add('show');
  map.setView([+lat, +lon], 13);
}

function cambiarUbicacion(inputId, listId, locId, prefix) {
  document.getElementById(locId).classList.remove('show');
  delete pending[prefix];
  document.getElementById(inputId).value = '';
  document.getElementById(inputId).focus();
}

/* ── CONTACTOS ── */
function agregarContacto(containerId, nombre, cargo, tel, mail) {
  const div = document.createElement('div');
  div.className = 'contacto-block';
  div.innerHTML = `
    <button class="btn-rem-c" onclick="this.closest('.contacto-block').remove()" title="Quitar"><i class="ti ti-x"></i></button>
    <div class="c-row">
      <div class="c-field"><span class="c-label">Nombre</span><input type="text" placeholder="Nombre del contacto" value="${nombre||''}"/></div>
      <div class="c-field"><span class="c-label">Cargo</span><input type="text" placeholder="Cargo" value="${cargo||''}"/></div>
    </div>
    <div class="c-row">
      <div class="c-field"><span class="c-label">Teléfono</span><input type="tel" placeholder="Ej: 11-1234-5678" value="${tel||''}"/></div>
      <div class="c-field"><span class="c-label">Email</span><input type="email" placeholder="Ej: mail@empresa.com" value="${mail||''}"/></div>
    </div>`;
  document.getElementById(containerId).appendChild(div);
}

function leerContactos(containerId) {
  return Array.from(document.querySelectorAll('#' + containerId + ' .contacto-block')).map(b => {
    const inp = b.querySelectorAll('input');
    return {nombre: inp[0].value.trim(), cargo: inp[1].value.trim(), tel: inp[2].value.trim(), mail: inp[3].value.trim()};
  }).filter(c => c.nombre || c.tel || c.mail);
}

/* ── POPUP ── */
function buildPopup(e) {
  const est = ESTADOS[e.estado];
  const badge = est ? `<span style="background:${est.color};color:${est.text};padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500;">${est.label}</span>` : '';
  const tipoLabel = e.tipo === 'suc' ? '🏪 Sucursal' : '🏢 Casa Central';
  const loc = e.ciudad ? `<br/><span style="color:#888;font-size:11px;">${e.ciudad.split(',').slice(0,2).join(',')}</span>` : '';
  const ct = (e.contactos||[]).map(c => `
    <div style="margin-top:5px;padding:5px 7px;background:#f4f6f9;border-radius:6px;font-size:11px;">
      <b style="color:#1a2740;">${c.nombre||'—'}</b>${c.cargo ? ` <span style="color:#888;">· ${c.cargo}</span>` : ''}
      ${c.tel  ? `<br/><i style="color:#555;">📞 ${c.tel}</i>`  : ''}
      ${c.mail ? `<br/><i style="color:#555;">✉ ${c.mail}</i>` : ''}
    </div>`).join('');
  return `<div style="min-width:170px;max-width:260px;"><b style="font-size:13px;color:#1a2740;">${e.nombre}</b><br/><span style="font-size:10px;color:#8a99b0;">${tipoLabel}</span><br/>${badge}${loc}${ct}</div>`;
}

/* ── CRUD ── */
function _crearYAgregar(datos) {
  const marker = L.marker([datos.lat, datos.lng], {icon: markerIcon(datos.estado, datos.tipo)}).addTo(map);
  marker.bindPopup(buildPopup(datos), {maxWidth: 270});
  const empresa = {...datos, marker};
  empresas.push(empresa);
  return empresa;
}

function setTipo(prefix, tipo) {
  const ccBtn  = document.getElementById(prefix + '-tipo-cc');
  const sucBtn = document.getElementById(prefix + '-tipo-suc');
  const wrap   = document.getElementById(prefix + '-madre-wrap');
  ccBtn.classList.toggle('active', tipo === 'cc');
  sucBtn.classList.toggle('active', tipo === 'suc');
  wrap.style.display = tipo === 'suc' ? 'block' : 'none';
  if (tipo === 'suc') actualizarSelectMadre(prefix);
}

function actualizarSelectMadre(prefix) {
  const sel = document.getElementById(prefix + '-madre');
  const actual = sel.value;
  const casas = empresas.filter(e => e.tipo !== 'suc');
  sel.innerHTML = '<option value="">— Seleccioná empresa —</option>' +
    casas.map(e => `<option value="${e.id}" ${e.id == actual ? 'selected' : ''}>${e.nombre}</option>`).join('');
}

function getTipo(prefix) {
  return document.getElementById(prefix + '-tipo-suc').classList.contains('active') ? 'suc' : 'cc';
}

function guardarNueva(prefix, contactosId, locId) {
  const nombre    = document.getElementById(prefix + '-nombre').value.trim();
  const estado    = document.getElementById(prefix + '-estado').value;
  const contactos = leerContactos(contactosId);
  const loc       = pending[prefix];
  const tipo      = getTipo(prefix);
  const madre     = tipo === 'suc' ? document.getElementById(prefix + '-madre').value : null;
  if (!loc)    { mostrarToast('Seleccioná una ubicación'); return; }
  if (!nombre) { mostrarToast('Ingresá el nombre'); return; }
  if (!estado) { mostrarToast('Seleccioná un estado'); return; }
  if (tipo === 'suc' && !madre) { mostrarToast('Seleccioná la empresa madre'); return; }
  const id = Date.now();
  _crearYAgregar({id, nombre, estado, tipo, madre, ciudad: loc.nombre, contactos, lat: loc.lat, lng: loc.lng});
  guardarSheets(); renderLista();
  document.getElementById(prefix + '-nombre').value = '';
  document.getElementById(prefix + '-estado').value = '';
  document.getElementById(contactosId).innerHTML = '';
  document.getElementById(locId).classList.remove('show');
  // reset tipo
  setTipo(prefix, 'cc');
  delete pending[prefix];
  cerrarSheet();
  mostrarToast('Guardado');
}

function eliminarEmpresa(id) {
  if (!confirm('¿Eliminar esta empresa?')) return;
  const idx = empresas.findIndex(e => e.id === id);
  if (idx === -1) return;
  map.removeLayer(empresas[idx].marker);
  empresas.splice(idx, 1);
  guardarSheets(); renderLista();
  mostrarToast('Empresa eliminada');
}

/* ── MODAL ── */
function abrirModal(id) {
  const e = empresas.find(e => e.id === id);
  if (!e) return;
  modalId = id;
  document.getElementById('m-nombre').value = e.nombre;
  document.getElementById('m-estado').value = e.estado || '';
  document.getElementById('m-contactos').innerHTML = '';
  (e.contactos||[]).forEach(c => agregarContacto('m-contactos', c.nombre, c.cargo, c.tel, c.mail));
  pending['m'] = {lat: e.lat, lng: e.lng, nombre: e.ciudad||''};
  document.getElementById('m-loc-texto').textContent = (e.ciudad||'').split(',').slice(0,2).join(',');
  document.getElementById('m-loc').classList.add('show');
  document.getElementById('m-buscar').value = '';
  // restore tipo
  const tipoActual = e.tipo || 'cc';
  setTipo('m', tipoActual);
  if (tipoActual === 'suc') {
    actualizarSelectMadre('m');
    if (e.madre) document.getElementById('m-madre').value = e.madre;
  }
  document.getElementById('modal').classList.add('open');
}
function cerrarModal() { document.getElementById('modal').classList.remove('open'); modalId = null; delete pending['m']; }
function guardarModal() {
  const nombre    = document.getElementById('m-nombre').value.trim();
  const estado    = document.getElementById('m-estado').value;
  const contactos = leerContactos('m-contactos');
  const loc       = pending['m'];
  const tipo      = getTipo('m');
  const madre     = tipo === 'suc' ? document.getElementById('m-madre').value : null;
  if (!nombre || !estado) { mostrarToast('Completá nombre y estado'); return; }
  const e = empresas.find(e => e.id === modalId);
  if (!e) return;
  Object.assign(e, {nombre, estado, contactos, tipo, madre});
  if (loc) { e.lat = loc.lat; e.lng = loc.lng; e.ciudad = loc.nombre; e.marker.setLatLng([loc.lat, loc.lng]); }
  e.marker.setIcon(markerIcon(e.estado, e.tipo));
  e.marker.setPopupContent(buildPopup(e));
  guardarSheets(); renderLista(); cerrarModal();
  mostrarToast('Cambios guardados');
}
document.getElementById('modal').addEventListener('click', function(ev) { if (ev.target === this) cerrarModal(); });

/* ── LISTA AGRUPADA ── */
function cardContactos(e, cls) {
  const est = ESTADOS[e.estado] || {label:'—', color:'#ccc', text:'#555'};
  const ct  = (e.contactos||[]).slice(0,2).map(c => `<div>${c.nombre}${c.cargo?' · '+c.cargo:''}${c.tel?' 📞'+c.tel:''}${c.mail?' ✉'+c.mail:''}</div>`).join('');
  const mas = (e.contactos||[]).length > 2 ? `<div style="color:#8a99b0;">+${e.contactos.length-2} más</div>` : '';
  const loc = e.ciudad ? e.ciudad.split(',').slice(0,2).join(',') : '';
  return {est, ct, mas, loc};
}

function renderLista() {
  const texto  = (gv('inp-filtro') || gv('d-filtro')).toLowerCase();
  const estado = gv('filtro-estado') || gv('d-filtro-estado');

  const match = e => {
    const mt = e.nombre.toLowerCase().includes(texto) || (e.ciudad||'').toLowerCase().includes(texto) ||
      (e.contactos||[]).some(c => (c.nombre+c.cargo+c.tel+c.mail).toLowerCase().includes(texto));
    return mt && (!estado || e.estado === estado);
  };

  const count = empresas.length;
  sv('contador', count);
  document.getElementById('header-count').textContent = count + (count !== 1 ? ' empresas' : ' empresa');

  // Separar casas centrales y sucursales
  const casas = empresas.filter(e => e.tipo !== 'suc');
  const sucursales = empresas.filter(e => e.tipo === 'suc');

  // Empresas sin casa central (sueltas)
  const sueltas = sucursales.filter(s => !casas.find(c => String(c.id) === String(s.madre)));

  let html = '';

  // Grupos: casa central + sus sucursales
  casas.forEach(cc => {
    const hijos = sucursales.filter(s => String(s.madre) === String(cc.id));
    const ccMatch  = match(cc);
    const hijosMatch = hijos.filter(match);
    if (!ccMatch && !hijosMatch.length) return;

    const {est, ct, mas, loc} = cardContactos(cc);
    const haySuc = hijos.length > 0;
    const grupoId = 'g' + cc.id;

    html += `<div class="grupo-empresa">
      <div class="grupo-header" style="border-left-color:${est.color};" ${haySuc ? `onclick="toggleGrupo('${grupoId}')"` : ''}>
        <div class="gh-top">
          <span style="font-size:16px;">🏢</span>
          <span class="gh-nombre">${cc.nombre}</span>
          ${haySuc ? `<span class="gh-toggle" id="toggle-${grupoId}">▼</span>` : ''}
        </div>
        <span class="gh-badge" style="background:${est.color};color:${est.text};">${est.label}</span>
        ${loc ? `<div class="gh-ciudad"><i class="ti ti-map-pin" style="font-size:10px;"></i> ${loc}</div>` : ''}
        <div style="font-size:11px;color:#5a6a85;margin-top:3px;">${ct}${mas}</div>
        <div class="gh-actions" onclick="event.stopPropagation()">
          <button onclick="centrarEn(${cc.id})"><i class="ti ti-map-pin"></i> Ver</button>
          <button onclick="abrirModal(${cc.id})"><i class="ti ti-edit"></i> Editar</button>
          <button class="btn-del" onclick="eliminarEmpresa(${cc.id})"><i class="ti ti-trash"></i></button>
        </div>
      </div>`;

    if (haySuc) {
      html += `<div class="sucursales-wrap" id="${grupoId}">`;
      hijosMatch.forEach(s => {
        const {est:se, ct:sc, mas:sm, loc:sl} = cardContactos(s);
        html += `<div class="sucursal-card" style="border-left-color:${se.color};">
          <div style="display:flex;align-items:center;gap:6px;">
            <span style="font-size:13px;">🏪</span>
            <span class="sc-nombre">${s.nombre}</span>
          </div>
          <span class="sc-badge" style="background:${se.color};color:${se.text};">${se.label}</span>
          ${sl ? `<div class="sc-ciudad"><i class="ti ti-map-pin" style="font-size:9px;"></i> ${sl}</div>` : ''}
          <div class="sc-contactos">${sc}${sm}</div>
          <div class="sc-actions">
            <button onclick="centrarEn(${s.id})"><i class="ti ti-map-pin"></i> Ver</button>
            <button onclick="abrirModal(${s.id})"><i class="ti ti-edit"></i> Editar</button>
            <button class="btn-del" onclick="eliminarEmpresa(${s.id})"><i class="ti ti-trash"></i></button>
          </div>
        </div>`;
      });
      html += `</div>`;
    }
    html += `</div>`;
  });

  // Sucursales sin casa central registrada
  sueltas.filter(match).forEach(s => {
    const {est, ct, mas, loc} = cardContactos(s);
    html += `<div class="empresa-card" style="border-left-color:${est.color};">
      <div style="display:flex;align-items:center;gap:6px;"><span>🏪</span><span class="ec-nombre">${s.nombre}</span></div>
      <span class="ec-badge" style="background:${est.color};color:${est.text};">${est.label}</span>
      ${loc ? `<div class="ec-ciudad"><i class="ti ti-map-pin" style="font-size:10px;"></i> ${loc}</div>` : ''}
      <div class="ec-contactos">${ct}${mas}</div>
      <div class="ec-actions">
        <button onclick="centrarEn(${s.id})"><i class="ti ti-map-pin"></i> Ver</button>
        <button onclick="abrirModal(${s.id})"><i class="ti ti-edit"></i> Editar</button>
        <button class="btn-del" onclick="eliminarEmpresa(${s.id})"><i class="ti ti-trash"></i></button>
      </div>
    </div>`;
  });

  if (!html) html = '<div class="empty-msg">Sin resultados</div>';
  ['lista-empresas','d-lista-empresas'].forEach(id => { const el = document.getElementById(id); if (el) el.innerHTML = html; });
}

function toggleGrupo(id) {
  const wrap   = document.getElementById(id);
  const toggle = document.getElementById('toggle-' + id);
  if (!wrap) return;
  const open = wrap.classList.toggle('open');
  if (toggle) toggle.classList.toggle('open', open);
}

function centrarEn(id) {
  const e = empresas.find(e => e.id === id);
  if (!e) return;
  map.setView([e.lat, e.lng], 13);
  e.marker.openPopup();
  cerrarSheet();
}

/* ── SHEETS / TABS ── */
function abrirSheet(cual) { cerrarSheet(); document.getElementById('sheet-overlay').classList.add('open'); document.getElementById('sheet-'+cual).classList.add('open'); }
function cerrarSheet() { document.querySelectorAll('.sheet').forEach(s => s.classList.remove('open')); document.getElementById('sheet-overlay').classList.remove('open'); }
function desktopTab(tab, btn) {
  document.querySelectorAll('.desktop-panel .tabs button').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.desktop-panel .tab-content').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('dtab-'+tab).classList.add('active');
}

/* ── STORAGE: Google Sheets + cache local ── */

function datosLimpios() {
  return empresas.map(({id,nombre,estado,tipo,madre,ciudad,contactos,lat,lng}) => ({id,nombre,estado,tipo:tipo||'cc',madre:madre||null,ciudad,contactos,lat,lng}));
}

function guardarLocal() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(datosLimpios()));
}

async function guardarSheets() {
  guardarLocal();
  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({action: 'save', empresas: datosLimpios()})
    });
  } catch(e) { mostrarToast('Sin conexion, datos guardados localmente'); }
}

function cargarLocal() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const datos = JSON.parse(raw);
    if (!datos.length) return false;
    datos.forEach(e => _crearYAgregar(e));
    renderLista();
    return true;
  } catch(e) { return false; }
}

async function cargarSheets() {
  mostrarToast('Sincronizando datos...');
  try {
    const r = await fetch(SCRIPT_URL + '?t=' + Date.now());
    const data = await r.json();
    if (data.ok && data.empresas && data.empresas.length) {
      // Limpiar mapa actual
      empresas.forEach(e => { try { map.removeLayer(e.marker); } catch(err) {} });
      empresas = [];
      data.empresas.forEach(e => _crearYAgregar(e));
      guardarLocal();
      renderLista();
      mostrarToast('Datos sincronizados (' + empresas.length + ' empresas)');
    } else if (data.ok && (!data.empresas || !data.empresas.length)) {
      // Sheets vacio, subir lo que hay en local
      const hayLocal = cargarLocal();
      if (hayLocal && empresas.length) {
        await guardarSheets();
        mostrarToast('Datos subidos a la nube (' + empresas.length + ' empresas)');
      } else {
        mostrarToast('Base de datos vacia');
      }
    }
  } catch(e) {
    mostrarToast('Sin conexion, usando datos locales');
    cargarLocal();
  }
}

/* ── EXPORTAR EXCEL (.xlsx) ── */
function exportarExcel() {
  if (!empresas.length) { mostrarToast('No hay empresas para exportar'); return; }
  const encabezado = ['Empresa','Estado','Ubicacion','Contacto','Cargo','Telefono','Email'];
  const filas = [encabezado];
  empresas.forEach(e => {
    const est = (ESTADOS[e.estado] || {label: e.estado || ''}).label;
    const loc = (e.ciudad||'').split(',').slice(0,3).join(',').trim();
    if (!e.contactos || !e.contactos.length) {
      filas.push([e.nombre, est, loc, '', '', '', '']);
    } else {
      e.contactos.forEach(c => filas.push([e.nombre, est, loc, c.nombre||'', c.cargo||'', c.tel||'', c.mail||'']));
    }
  });
  const ws = XLSX.utils.aoa_to_sheet(filas);
  // Ancho de columnas
  ws['!cols'] = [20,32,30,22,18,18,28].map(w => ({wch: w}));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Empresas');
  XLSX.writeFile(wb, 'empresas-' + new Date().toISOString().slice(0,10) + '.xlsx');
  mostrarToast('Excel descargado');
}

/* ── IMPORTAR EXCEL / CSV ── */
function importarExcel(event) {
  const file = event.target.files[0];
  if (!file) return;
  const esXlsx = /\.(xlsx|xls)$/i.test(file.name);
  const reader = new FileReader();
  reader.onload = async function(e) {
    try {
      let filas = [];
      if (esXlsx) {
        const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
        filas = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header:1, defval:''});
      } else {
        filas = e.target.result.split(/\r?\n/).map(line => {
          const cols = []; let cur = '', inQ = false;
          for (const ch of line) {
            if (ch === '"') inQ = !inQ;
            else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
            else cur += ch;
          }
          cols.push(cur.trim()); return cols;
        }).filter(r => r.some(c => c !== ''));
      }
      if (filas.length < 2) { mostrarToast('El archivo no tiene datos'); event.target.value=''; return; }
      const primera = filas[0].map(c => String(c).toLowerCase());
      const datos = (primera.includes('empresa')||primera.includes('nombre')||primera.includes('estado')) ? filas.slice(1) : filas;

      // Agrupar por empresa — columnas: 0=Empresa,1=Estado,2=Ubicacion,3=Contacto,4=Cargo,5=Telefono,6=Email
      // Si la columna Empresa está vacía, se hereda el nombre de la fila anterior (estilo Excel)
      const grupos = {};
      let ultimoNombre = '';
      datos.forEach(row => {
        const nom = String(row[0]||'').trim() || ultimoNombre;
        if (!nom) return;
        ultimoNombre = nom;
        if (!grupos[nom]) {
          grupos[nom] = {
            nombre: nom,
            estado: MAPA_ESTADOS[String(row[1]||'').trim().toLowerCase()] || 'prospecto',
            ciudad: String(row[2]||'').trim(),
            contactos: []
          };
        }
        // Si la fila tiene datos de estado/ciudad aunque sea continuación, actualizar si estaban vacíos
        if (!grupos[nom].estado || grupos[nom].estado === 'prospecto') {
          const est = MAPA_ESTADOS[String(row[1]||'').trim().toLowerCase()];
          if (est) grupos[nom].estado = est;
        }
        if (!grupos[nom].ciudad && String(row[2]||'').trim()) {
          grupos[nom].ciudad = String(row[2]||'').trim();
        }
        const cNom  = String(row[3]||'').trim();
        const cargo = String(row[4]||'').trim();
        const tel   = String(row[5]||'').trim();
        const mail  = String(row[6]||'').trim();
        if (cNom || tel || mail) grupos[nom].contactos.push({nombre:cNom, cargo, tel, mail});
      });

      const delExcel = Object.values(grupos);
      if (!delExcel.length) { mostrarToast('No se encontraron datos válidos'); event.target.value=''; return; }

      mostrarToast('Procesando ' + delExcel.length + ' empresas...');
      let actualizadas = 0, agregadas = 0, sinUbicacion = 0;

      for (const emp of delExcel) {
        const idx = empresas.findIndex(ex => ex.nombre.toLowerCase().trim() === emp.nombre.toLowerCase().trim());
        if (idx !== -1) {
          // Actualizar existente
          const ex = empresas[idx];
          const ciudadCambio = emp.ciudad && emp.ciudad !== ex.ciudad;
          let lat = ex.lat, lng = ex.lng;
          if (ciudadCambio) {
            try {
              const r = await fetch('https://nominatim.openstreetmap.org/search?format=json&countrycodes=ar&q='+encodeURIComponent(emp.ciudad)+'&limit=1');
              const geo = await r.json();
              if (geo.length) { lat = +geo[0].lat; lng = +geo[0].lon; }
            } catch(err) {}
            await new Promise(res => setTimeout(res, 300));
          }
          Object.assign(ex, {nombre:emp.nombre, estado:emp.estado, ciudad:emp.ciudad||ex.ciudad, contactos:emp.contactos, lat, lng});
          ex.marker.setLatLng([lat, lng]);
          ex.marker.setIcon(markerIcon(ex.estado));
          ex.marker.setPopupContent(buildPopup(ex));
          actualizadas++;
        } else {
          // Agregar nueva
          let lat, lng;
          if (emp.ciudad) {
            try {
              const r = await fetch('https://nominatim.openstreetmap.org/search?format=json&countrycodes=ar&q='+encodeURIComponent(emp.ciudad)+'&limit=1');
              const geo = await r.json();
              if (geo.length) { lat = +geo[0].lat; lng = +geo[0].lon; }
            } catch(err) {}
            await new Promise(res => setTimeout(res, 300));
          }
          if (!lat) { lat = -38.5+(Math.random()-0.5)*10; lng = -63.5+(Math.random()-0.5)*20; sinUbicacion++; }
          _crearYAgregar({...emp, id: Date.now()+Math.floor(Math.random()*100000), lat, lng});
          agregadas++;
        }
      }
      guardarLocal(); renderLista();
      const partes = [];
      if (actualizadas) partes.push(actualizadas + ' actualizada' + (actualizadas!==1?'s':''));
      if (agregadas)    partes.push(agregadas    + ' nueva'       + (agregadas!==1?'s':''));
      if (sinUbicacion) partes.push(sinUbicacion + ' sin ubicación exacta');
      mostrarToast(partes.join(' · ') || 'Sin cambios');
    } catch(err) { mostrarToast('Error al leer el archivo'); console.error(err); }
    event.target.value = '';
  };
  esXlsx ? reader.readAsArrayBuffer(file) : reader.readAsText(file, 'UTF-8');
}

/* ── BACKUP / RESTORE JSON ── */
function exportarJSON() {
  if (!empresas.length) { mostrarToast('No hay datos para exportar'); return; }
  const datos = empresas.map(({id,nombre,estado,ciudad,contactos,lat,lng}) => ({id,nombre,estado,ciudad,contactos,lat,lng}));
  const blob = new Blob([JSON.stringify({version:1, exportado:new Date().toISOString(), empresas:datos}, null, 2)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'backup-' + new Date().toISOString().slice(0,10) + '.json'; a.click();
  mostrarToast('Backup descargado');
}
function importarJSON(event) {
  const file = event.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const parsed = JSON.parse(e.target.result);
      const lista = parsed.empresas || parsed;
      if (!Array.isArray(lista)) throw new Error();
      if (!confirm(`Importar ${lista.length} empresas? Se combinan sin borrar las existentes.`)) return;
      const idsExistentes = new Set(empresas.map(e => e.id));
      let imp = 0;
      lista.forEach(emp => { if (!idsExistentes.has(emp.id)) { _crearYAgregar(emp); imp++; } });
      guardarSheets(); renderLista();
      mostrarToast(imp + ' empresa' + (imp!==1?'s':'') + ' importada' + (imp!==1?'s':''));
    } catch { mostrarToast('Archivo inválido'); }
    event.target.value = '';
  };
  reader.readAsText(file, 'UTF-8');
}

/* ── HELPERS ── */
function gv(id) { const el = document.getElementById(id); return el ? el.value : ''; }
function sv(id, v) { const el = document.getElementById(id); if (el) el.textContent = v; }
let toastTimer;
function mostrarToast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}


/* ── MENÚ MÓVIL ── */
function toggleMobMenu() {
  const menu = document.getElementById('mob-menu');
  menu.classList.toggle('open');
}
function mobAccion(accion) {
  document.getElementById('mob-menu').classList.remove('open');
  if (accion === 'excel')    exportarExcel();
  if (accion === 'importar') document.getElementById('imp-excel-file').click();
  if (accion === 'backup')   exportarJSON();
  if (accion === 'restaurar') document.getElementById('imp-json-file').click();
}
// Cerrar menú al tocar fuera
document.addEventListener('click', function(e) {
  const menu = document.getElementById('mob-menu');
  const btn  = document.getElementById('mob-menu-btn');
  if (menu.classList.contains('open') && !menu.contains(e.target) && !btn.contains(e.target)) {
    menu.classList.remove('open');
  }
});

initMap();
cargarSheets();
